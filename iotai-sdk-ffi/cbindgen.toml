[export]
include = [
    "IotaiError",
    "IotaiTransport",
    "IotaiRamRegion",
    "IotaiFaultRecord",
    "IotaiUploadStats",
]

[export.rename]
"IotaiError" = "iotai_error_t"
"IotaiTransport" = "iotai_transport_t"
"IotaiRamRegion" = "iotai_ram_region_t"
"IotaiFaultRecord" = "iotai_fault_record_t"
"IotaiUploadStats" = "iotai_upload_stats_t"

[enum]
rename_variants = "ScreamingSnakeCase"
prefix_with_name = true

[fn]
rename_args = "SnakeCase"

[parse]
parse_deps = false

[parse.expand]
crates = ["iotai-sdk-ffi"]

language = "C"
header = """/* iotai-sdk C bindings — generated by cbindgen, do not edit */
#ifndef IOTAI_SDK_H
#define IOTAI_SDK_H

#include <stdint.h>
#include <stdbool.h>
#include <stddef.h>
"""
trailer = """
#endif /* IOTAI_SDK_H */
"""

style = "type"
