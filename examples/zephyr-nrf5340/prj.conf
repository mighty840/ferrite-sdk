# Ferrite Zephyr BLE example — nRF5340-DK
#
# BLE peripheral with GATT notifications for chunk transport.

# ── BLE ──────────────────────────────────────────────────────────────

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Ferrite nRF5340"
CONFIG_BT_DEVICE_APPEARANCE=0

# GATT configuration
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_ATT_TX_COUNT=4
CONFIG_BT_L2CAP_TX_BUF_COUNT=4

# Request larger MTU for chunk-sized notifications (244 bytes payload)
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# ── System ───────────────────────────────────────────────────────────

CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_CBPRINTF_FP_SUPPORT=y

# ── Logging ──────────────────────────────────────────────────────────

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y

# ── GPIO (LEDs) ──────────────────────────────────────────────────────

CONFIG_GPIO=y

# ── Timers ───────────────────────────────────────────────────────────

CONFIG_COUNTER=y
