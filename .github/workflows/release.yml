name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-ffi:
    name: "Build FFI – ${{ matrix.target }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - thumbv7em-none-eabihf
          - thumbv7em-none-eabi
          - thumbv7m-none-eabi
          - thumbv6m-none-eabi
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build static library
        run: >
          cargo build -p ferrite-sdk
          --target ${{ matrix.target }}
          --features cortex-m
          --no-default-features
          --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libferrite_sdk-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/libferrite_sdk.a

  header:
    name: Generate C header
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Generate header
        run: cbindgen --crate ferrite-sdk --output ferrite_sdk.h

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ferrite_sdk-header
          path: ferrite_sdk.h

  release:
    name: Create GitHub Release
    needs: [build-ffi, header]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/libferrite_sdk-*; do
            target=$(basename "$dir" | sed 's/libferrite_sdk-//')
            cp "$dir/libferrite_sdk.a" "release/libferrite_sdk-${target}.a"
          done
          cp artifacts/ferrite_sdk-header/ferrite_sdk.h release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
