services:
  ferrite:
    build: .
    ports:
      - "4000:4000"
    environment:
      RUST_LOG: info
      BASIC_AUTH_USER: admin
      BASIC_AUTH_PASS: ${BASIC_AUTH_PASS:-admin}
      INGEST_API_KEY: ${INGEST_API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      RETENTION_DAYS: ${RETENTION_DAYS:-90}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      ALERT_OFFLINE_MINUTES: ${ALERT_OFFLINE_MINUTES:-10}
    volumes:
      - ferrite-data:/home/ferrite/data
      - ferrite-elfs:/home/ferrite/elfs
    restart: unless-stopped

  # Optional: Keycloak for OIDC auth (uncomment to enable)
  # keycloak:
  #   image: quay.io/keycloak/keycloak:26.0
  #   command:
  #     - start-dev
  #     - --import-realm
  #   environment:
  #     KEYCLOAK_ADMIN: admin
  #     KEYCLOAK_ADMIN_PASSWORD: admin
  #   volumes:
  #     - ./docker/keycloak/ferrite-realm.json:/opt/keycloak/data/import/ferrite-realm.json:ro
  #   ports:
  #     - "9090:8080"

volumes:
  ferrite-data:
  ferrite-elfs:
