[export]
include = [
    "IotaiError",
    "IotaiTransport",
    "IotaiRamRegion",
    "IotaiFaultRecord",
    "IotaiUploadStats",
]

[export.rename]
"IotaiError" = "ferrite_error_t"
"IotaiTransport" = "ferrite_transport_t"
"IotaiRamRegion" = "ferrite_ram_region_t"
"IotaiFaultRecord" = "ferrite_fault_record_t"
"IotaiUploadStats" = "ferrite_upload_stats_t"

[enum]
rename_variants = "ScreamingSnakeCase"
prefix_with_name = true

[fn]
rename_args = "SnakeCase"

[parse]
parse_deps = false

[parse.expand]
crates = ["ferrite-ffi"]

language = "C"
header = """/* ferrite-sdk C bindings — generated by cbindgen, do not edit */
#ifndef FERRITE_SDK_H
#define FERRITE_SDK_H

#include <stdint.h>
#include <stdbool.h>
#include <stddef.h>
"""
trailer = """
#endif /* FERRITE_SDK_H */
"""

style = "type"
